<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>MTWO LABS</title>
  <style>
    @font-face {
      font-family: 'Commit Mono';
      src: url('fonts/CommitMono-400-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Commit Mono';
      src: url('fonts/CommitMono-700-Regular.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Departure Mono';
      src: url('fonts/DepartureMono-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Outfit';
      src: url('fonts/Outfit-Variable.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: inherit; }

    ::selection { background: #a0616a; color: #fff; }

    body {
      font-family: 'Commit Mono', monospace;
      color: #aaa;
      background: #0a0a0c;
      line-height: 1.7;
      font-size: 0.95rem;
      overflow: hidden;
      cursor: url('cursor.svg') 16 16, crosshair;
    }

    #ocean-canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    #ocean-canvas.shader-ready {
      opacity: 1;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 24px 48px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.15em;
    }

    .tagline { color: #666; margin-top: 2px; }

    a { color: rgba(255, 255, 255, 0.25); text-decoration: none; cursor: url('cursor.svg') 16 16, crosshair; }
    a:hover { color: rgba(255, 255, 255, 0.45); text-decoration: none; }

    footer {
      position: fixed;
      bottom: 24px;
      left: 24px;
      right: 24px;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
    }

    .footer-name {
      font-family: 'Departure Mono', monospace;
      color: #fff;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .footer-links {
      display: flex;
      gap: 16px;
      color: rgba(255, 255, 255, 0.15);
    }

    .footer-links a { font-size: 0.8rem; }

    @media (max-width: 600px) {
      .container { padding: 48px 20px 32px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <canvas id="ocean-canvas"></canvas>

  <div class="container">
    <h1>MTWO LABS</h1>
  </div>

  <footer>
    <span class="footer-name">MTWO Labs GmbH</span>
    <div class="footer-links">
      <a href="terms">Terms of Service</a>
      <span style="color: rgba(255,255,255,0.15);">|</span>
      <a href="privacy">Privacy Policy</a>
    </div>
  </footer>

  <script type="module" src="background.js"></script>
</body>
</html>
